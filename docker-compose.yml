services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      AUTH_USER: ${AUTH_USER:-admin}
      AUTH_PASS: ${AUTH_PASS:-changeme}
      SHELL: /bin/bash
      HOST_ROOT: /host
    volumes:
      - /:/host:rw
    expose:
      - "3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
